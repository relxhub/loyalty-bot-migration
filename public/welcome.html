<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ยินดีต้อนรับสมาชิกใหม่</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #121212;
            --secondary-bg: #1E1E1E;
            --text-color: #ffffff;
        }
        html, body {
            overscroll-behavior-y: none;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Kanit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: var(--secondary-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .fade-in { 
            animation: fadeIn 0.5s ease-out forwards; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.95); } 
            to { opacity: 1; transform: scale(1); } 
        }
        .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes bounceIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[#121212]">

    <div class="glass-card p-8 w-full max-w-sm text-center shadow-2xl relative overflow-hidden fade-in border border-yellow-500/20">
        <!-- Background Glow -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-yellow-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-orange-500/10 rounded-full blur-3xl"></div>
        
        <div class="w-24 h-24 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl shadow-[0_0_30px_rgba(245,158,11,0.3)] relative z-10 bounce-in border-4 border-zinc-900">
            <i class="ri-checkbox-circle-fill text-white"></i>
        </div>
        
        <h1 class="text-2xl font-bold mb-2 text-white relative z-10">ยินดีต้อนรับสมาชิกใหม่!</h1>
        <p class="text-zinc-400 text-sm mb-6 relative z-10">รหัสสมาชิกของคุณคือ:</p>

        <div class="relative z-10 bg-black/30 border border-zinc-700 rounded-xl p-4 text-white text-center tracking-wider uppercase text-2xl font-bold text-yellow-500 mb-8 shadow-inner">
            <span id="customerId">กำลังโหลด...</span>
        </div>

        <button id="confirm-button" class="w-full py-4 bg-gradient-to-br from-yellow-400 to-orange-500 hover:from-yellow-500 hover:to-orange-600 rounded-xl font-bold text-lg text-white shadow-lg shadow-orange-500/20 transition active:scale-95 relative z-10 border border-orange-400/50">
            เข้าสู่หน้าหลัก
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const customerId = urlParams.get('customerId');
            const botUsername = urlParams.get('botUsername'); // Get bot username from URL
            const customerIdElement = document.getElementById('customerId');
            
            if (customerId) {
                customerIdElement.textContent = customerId;
            } else {
                customerIdElement.textContent = 'ไม่พบรหัส';
            }

            // --- Logic for the button ---
            const confirmButton = document.getElementById('confirm-button');
            confirmButton.addEventListener('click', () => {
                // Haptic feedback for better UX
                try { tg.hapticFeedback.impactOccurred('medium'); } catch(e) {}
                
                if (botUsername) {
                    // Navigate to the main app page using the dynamic bot username
                    tg.openTelegramLink(`https://t.me/${botUsername}/app`);
                } else {
                    // Fallback or error if bot username isn't passed
                    console.error("Bot username not found in URL. Cannot redirect.");
                    tg.showAlert("เกิดข้อผิดพลาด: ไม่สามารถกลับไปหน้าหลักได้");
                }
            });
        };
    </script>
</body>
</html>
