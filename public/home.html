<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050C0D;
            --secondary-bg: #161B22;
        }
        body {
            background-color: var(--bg-color);
            font-family: 'Kanit', sans-serif;
            min-height: 100vh; /* Ensure body takes full viewport height */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Center content vertically */
        }

        /* CSS สำหรับแถบนำทางด้านล่าง */
        #bottom-nav {
            transition: transform 0.3s ease-in-out;
        }
        #bottom-nav.hide {
            transform: translateY(150%); /* ซ่อนออกไปด้านล่าง */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-5 text-white">

    <div class="text-center mb-12">
        <img src="logo.png" alt="Company Logo" class="w-64 mx-auto mb-8">
        <h1 class="text-3xl font-bold mb-2">ยินดีต้อนรับ</h1>
        <p class="text-gray-400">เลือกเมนูด้านล่างเพื่อเริ่มต้นใช้งาน</p>
    </div>

    <!-- Buttons Container -->
    <div class="w-full max-w-sm px-4 mb-24 space-y-4">
        
        <!-- Coupon Center Button -->
        <button onclick="openCouponCenter()" class="w-full bg-gradient-to-r from-yellow-500 to-orange-600 p-4 rounded-2xl flex items-center justify-between shadow-lg shadow-orange-900/20 active:scale-95 transition-transform group">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center text-2xl group-hover:rotate-12 transition-transform">
                    <i class="ri-ticket-2-fill text-white"></i>
                </div>
                <div class="text-left">
                    <div class="font-bold text-lg leading-none text-white">ศูนย์คูปอง</div>
                    <div class="text-xs text-orange-100 opacity-80 mt-1">เก็บคูปองส่วนลด & ของแถมฟรี</div>
                </div>
            </div>
            <i class="ri-arrow-right-s-line text-2xl opacity-50 text-white"></i>
        </button>

        <!-- Points Redemption Button -->
        <button onclick="openRedeemCenter()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 p-4 rounded-2xl flex items-center justify-between shadow-lg shadow-blue-900/20 active:scale-95 transition-transform group">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                    <i class="ri-gift-2-fill text-white"></i>
                </div>
                <div class="text-left">
                    <div class="font-bold text-lg leading-none text-white">แต้มแลกคูปอง</div>
                    <div class="text-xs text-blue-100 opacity-80 mt-1">ใช้แต้มสะสม แลกรับสิทธิพิเศษ</div>
                </div>
            </div>
            <i class="ri-arrow-right-s-line text-2xl opacity-50 text-white"></i>
        </button>
        
    </div>

    <!-- Coupon Modal -->
    <div id="coupon-modal" class="fixed inset-0 z-[100] flex items-end justify-center bg-black/80 hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm">
        <div class="bg-[#161B22] w-full max-w-md h-full flex flex-col transform translate-y-full transition-transform duration-300">

            <div class="flex-shrink-0 p-6 border-b border-gray-700 flex justify-between items-center bg-black/20">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i class="ri-ticket-2-line text-yellow-500"></i> ศูนย์คูปอง
                </h3>
                <button onclick="closeCouponModal()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition text-white">
                    <i class="ri-close-line"></i>
                </button>
            </div>

            <!-- Coupon List Container -->
            <div id="coupon-list" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">                <!-- Skeleton Loading -->
                <div class="animate-pulse space-y-4">
                    <div class="h-24 bg-white/5 rounded-2xl"></div>
                    <div class="h-24 bg-white/5 rounded-2xl"></div>
                </div>
            </div>

            <div id="no-coupons" class="hidden text-center py-12">
                <div class="text-4xl mb-2">🏷️</div>
                <div class="text-gray-400">ยังไม่มีคูปองให้เก็บในขณะนี้</div>
            </div>
        </div>
    </div>

    <!-- Points Redemption Modal -->
    <div id="redeem-modal" class="fixed inset-0 z-[100] flex items-end justify-center bg-black/80 hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm">
        <div class="bg-[#161B22] w-full max-w-md h-full flex flex-col transform translate-y-full transition-transform duration-300">

            <div class="flex-shrink-0 p-6 border-b border-gray-700 flex justify-between items-center bg-black/20">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i class="ri-gift-2-fill text-blue-500"></i> แต้มแลกคูปอง
                </h3>
                <button onclick="closeRedeemModal()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition text-white">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            
            <div class="flex-shrink-0 p-4 bg-black/10 border-b border-gray-700">
                <div class="text-sm text-gray-400 flex justify-between items-center">
                    <span>แต้มของคุณ:</span>
                    <span class="text-xl font-bold text-yellow-500" id="user-current-points">...</span>
                </div>
            </div>

            <div id="redeem-list" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                <div class="animate-pulse space-y-4">
                    <div class="h-24 bg-white/5 rounded-2xl"></div>
                </div>
            </div>

            <div id="no-redeem-coupons" class="hidden text-center py-12">
                <div class="text-4xl mb-2">🎁</div>
                <div class="text-gray-400">ยังไม่มีรายการให้แลกในขณะนี้</div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <div id="bottom-nav" class="fixed bottom-4 left-0 right-0 z-[70] mx-auto w-[calc(100%-2.5rem)] max-w-md bg-[var(--secondary-bg)] shadow-xl rounded-full p-2 flex justify-around items-center">
        <a href="home.html" class="flex flex-col items-center text-xs font-medium text-white w-1/3 py-1.5 rounded-xl transition active:scale-95">
            <i class="ri-home-4-fill text-xl"></i>
            <span>หน้าหลัก</span>
        </a>
        <a href="products.html" class="flex flex-col items-center text-xs font-medium text-gray-400 w-1/3 py-1.5 rounded-xl transition active:scale-95">
            <i class="ri-shopping-cart-line text-xl"></i>
            <span>เมนูสินค้า</span>
        </a>
        <a href="dashboard.html?v=1" class="flex flex-col items-center text-xs font-medium text-gray-400 w-1/3 py-1.5 rounded-xl transition active:scale-95">
            <i class="ri-wallet-3-line text-xl"></i>
            <span>บัตรสมาชิก</span>
        </a>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function openCouponCenter() {
            const modal = document.getElementById('coupon-modal');
            const content = modal.querySelector('div');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('translate-y-full');
            }, 10);
            fetchCoupons();
        }

        function closeCouponModal() {
            const modal = document.getElementById('coupon-modal');
            const content = modal.querySelector('div');
            modal.classList.add('opacity-0');
            content.classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function openRedeemCenter() {
            const modal = document.getElementById('redeem-modal');
            const content = modal.querySelector('div');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('translate-y-full');
            }, 10);
            fetchRedeemableCoupons();
        }

        function closeRedeemModal() {
            const modal = document.getElementById('redeem-modal');
            const content = modal.querySelector('div');
            modal.classList.add('opacity-0');
            content.classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        async function fetchCoupons() {
            const list = document.getElementById('coupon-list');
            try {
                const telegramId = tg.initDataUnsafe?.user?.id;
                const res = await fetch(`/api/coupons?telegramId=${telegramId}`);
                const data = await res.json();
                
                if (data.success && data.coupons.length > 0) {
                    list.innerHTML = data.coupons.map(c => renderCouponCard(c)).join('');
                    document.getElementById('no-coupons').classList.add('hidden');
                } else {
                    list.innerHTML = '';
                    document.getElementById('no-coupons').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                list.innerHTML = '<div class="text-red-400 text-center py-4">โหลดข้อมูลไม่สำเร็จ</div>';
            }
        }

        async function fetchRedeemableCoupons() {
            const list = document.getElementById('redeem-list');
            try {
                const telegramId = tg.initDataUnsafe?.user?.id;
                const res = await fetch(`/api/coupons/redeemable?telegramId=${telegramId}`);
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('user-current-points').innerText = (data.userPoints || 0).toLocaleString();

                    if (data.coupons.length > 0) {
                        list.innerHTML = data.coupons.map(c => renderRedeemCard(c)).join('');
                        document.getElementById('no-redeem-coupons').classList.add('hidden');
                    } else {
                        list.innerHTML = '';
                        document.getElementById('no-redeem-coupons').classList.remove('hidden');
                    }
                }
            } catch (err) {
                console.error(err);
                list.innerHTML = '<div class="text-red-400 text-center py-4">โหลดข้อมูลไม่สำเร็จ</div>';
            }
        }

        function renderCouponCard(c) {
            const isFull = c.totalQuota !== null && c.claimedCount >= c.totalQuota;
            const isLimitReached = c.isUserLimitReached;
            const progress = c.totalQuota ? (c.claimedCount / c.totalQuota) * 100 : 0;
            const quotaText = c.totalQuota ? `เหลือ ${c.totalQuota - c.claimedCount} ใบ` : 'ไม่จำกัดจำนวน';
            
            let benefitText = '';
            if (c.type === 'DISCOUNT_PERCENT') benefitText = `ลด ${parseFloat(c.value)}%`;
            else if (c.type === 'DISCOUNT_FLAT') benefitText = `ลด ${parseFloat(c.value)} บาท`;
            else if (c.type === 'GIFT') benefitText = `แถมฟรี!`;

            // กำหนดสถานะปุ่ม
            let btnText = 'เก็บเลย';
            let btnClass = 'bg-yellow-500 text-black hover:bg-yellow-400';
            
            if (isFull) {
                btnText = 'เต็มแล้ว';
                btnClass = 'bg-gray-700 text-gray-500 cursor-not-allowed';
            } else if (isLimitReached) {
                btnText = 'เก็บครบแล้ว';
                btnClass = 'bg-gray-600 text-gray-400'; // สีเทาเข้มขึ้นสำหรับคนที่เก็บครบแล้ว
            }

            return `
                <div class="relative bg-white/5 border border-white/10 rounded-2xl p-4 overflow-hidden group">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="text-xs text-yellow-500 font-bold mb-1 uppercase tracking-wider">${c.id}</div>
                            <div class="text-lg font-bold text-white">${c.name}</div>
                            <div class="text-xs text-gray-400">${c.description || ''}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-black text-white">${benefitText}</div>
                        </div>
                    </div>

                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <div class="flex justify-between text-[10px] text-gray-500 mb-1">
                                <span>${quotaText}</span>
                                <span>${Math.round(progress)}%</span>
                            </div>
                            <div class="h-1.5 bg-gray-800 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-yellow-600 to-yellow-400 transition-all duration-1000" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <button 
                            onclick="claimCoupon('${c.id}')"
                            class="px-6 py-2 rounded-xl font-bold text-sm transition active:scale-95 ${btnClass}">
                            ${btnText}
                        </button>
                    </div>

                    <!-- Decorative elements -->
                    <div class="absolute -left-2 top-1/2 -translate-y-1/2 w-4 h-4 bg-[#161B22] rounded-full border-r border-white/10"></div>
                    <div class="absolute -right-2 top-1/2 -translate-y-1/2 w-4 h-4 bg-[#161B22] rounded-full border-l border-white/10"></div>
                </div>
            `;
        }

        function renderRedeemCard(c) {
            const isFull = c.totalQuota !== null && c.claimedCount >= c.totalQuota;
            const isLimitReached = c.isUserLimitReached;
            const hasEnoughPoints = c.hasEnoughPoints;
            const progress = c.totalQuota ? (c.claimedCount / c.totalQuota) * 100 : 0;
            const quotaText = c.totalQuota ? `เหลือ ${c.totalQuota - c.claimedCount} สิทธิ์` : 'แลกได้ไม่อั้น';
            
            let benefitText = '';
            if (c.type === 'DISCOUNT_PERCENT') benefitText = `ลด ${parseFloat(c.value)}%`;
            else if (c.type === 'DISCOUNT_FLAT') benefitText = `ลด ${parseFloat(c.value)} บาท`;
            else if (c.type === 'GIFT') benefitText = `แถมฟรี!`;

            let btnText = `ใช้ ${c.pointsCost} แต้ม`;
            let btnClass = 'bg-blue-600 text-white hover:bg-blue-500';
            
            if (isFull) {
                btnText = 'สิทธิ์เต็มแล้ว';
                btnClass = 'bg-gray-700 text-gray-500 cursor-not-allowed';
            } else if (isLimitReached) {
                btnText = 'แลกครบสิทธิ์แล้ว';
                btnClass = 'bg-gray-600 text-gray-400';
            } else if (!hasEnoughPoints) {
                btnText = `แต้มไม่พอ (${c.pointsCost})`;
                btnClass = 'bg-gray-700 text-gray-400 cursor-not-allowed';
            }

            return `
                <div class="relative bg-gradient-to-br from-blue-900/20 to-[#161B22] border border-blue-500/20 rounded-2xl p-4 overflow-hidden group">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="text-xs text-blue-400 font-bold mb-1 uppercase tracking-wider">${c.id}</div>
                            <div class="text-lg font-bold text-white">${c.name}</div>
                            <div class="text-xs text-gray-400">${c.description || ''}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-black text-white">${benefitText}</div>
                        </div>
                    </div>

                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <div class="flex justify-between text-[10px] text-gray-500 mb-1">
                                <span>${quotaText}</span>
                                <span>${Math.round(progress)}%</span>
                            </div>
                            <div class="h-1.5 bg-gray-800 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-blue-600 to-blue-400 transition-all duration-1000" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <button 
                            onclick="${hasEnoughPoints && !isLimitReached && !isFull ? `redeemCoupon('${c.id}')` : ''}"
                            class="px-4 py-2 rounded-xl font-bold text-sm transition active:scale-95 ${btnClass}">
                            ${btnText}
                        </button>
                    </div>

                    <!-- Decorative elements -->
                    <div class="absolute -left-2 top-1/2 -translate-y-1/2 w-4 h-4 bg-[#161B22] rounded-full border-r border-blue-500/20"></div>
                    <div class="absolute -right-2 top-1/2 -translate-y-1/2 w-4 h-4 bg-[#161B22] rounded-full border-l border-blue-500/20"></div>
                </div>
            `;
        }

        async function redeemCoupon(id) {
            try {
                tg.HapticFeedback.impactOccurred('medium');
                
                tg.showConfirm('ยืนยันการใช้แต้มเพื่อแลกคูปองนี้ใช่หรือไม่?', async function(confirmed) {
                    if (!confirmed) return;

                    const res = await fetch('/api/coupons/redeem', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            telegramId: tg.initDataUnsafe.user.id.toString(),
                            couponId: id,
                            initData: tg.initData
                        })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        tg.showPopup({
                            title: 'แลกสำเร็จ! 🎉',
                            message: 'คูปองถูกส่งเข้ากระเป๋าของคุณแล้ว สามารถนำไปใช้เป็นส่วนลดได้ที่หน้าตะกร้าสินค้า',
                            buttons: [{ type: 'ok' }]
                        });
                        document.getElementById('user-current-points').innerText = data.remainingPoints.toLocaleString();
                        fetchRedeemableCoupons(); // Refresh UI
                    } else {
                        tg.showAlert(data.error || 'แลกคูปองไม่สำเร็จ');
                    }
                });

            } catch (err) {
                tg.showAlert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
            }
        }

        async function claimCoupon(id) {
            try {
                tg.HapticFeedback.impactOccurred('medium');
                const res = await fetch('/api/coupons/claim', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegramId: tg.initDataUnsafe.user.id.toString(),
                        couponId: id,
                        initData: tg.initData
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    tg.showPopup({
                        title: 'สำเร็จ!',
                        message: 'เก็บคูปองเข้ากระเป๋าเรียบร้อยแล้วครับ',
                        buttons: [{ type: 'ok' }]
                    });
                    fetchCoupons(); // Refresh UI
                } else {
                    tg.showAlert(data.error || 'เก็บคูปองไม่สำเร็จ');
                }
            } catch (err) {
                tg.showAlert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            if (tg.isVersionAtLeast('7.7')) {
                tg.disableVerticalSwipes();
            }

            if (tg.initDataUnsafe?.start_param) {
                window.location.replace(`dashboard.html?start_param=${tg.initDataUnsafe.start_param}`);
            }
        });
    </script>
</body>
</html>
