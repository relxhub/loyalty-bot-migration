<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relx Infinity - สินค้า</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinycolor/1.6.0/tinycolor.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        
        :root {
            --brand-red: #ff4d4d;
            --brand-dark: #121212;
            --brand-zinc: #18181b;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--brand-dark);
            color: white;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .skeleton {
            background: linear-gradient(90deg, #1f1f23 25%, #2d2d33 50%, #1f1f23 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .category-item {
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 1.25rem;
            background: #1f1f23;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 0.5rem;
        }

        .category-wrapper.active .category-item {
            background: linear-gradient(135deg, var(--brand-red), #b30000);
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 77, 77, 0.3);
            border-color: transparent;
        }

        .category-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .category-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: #a1a1aa;
            margin-top: 0.5rem;
            transition: color 0.3s;
        }

        .category-wrapper.active .category-label {
            color: white;
            font-weight: 600;
        }

        .info-card {
            background: var(--brand-zinc);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1.5rem;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .info-card:active {
            transform: scale(0.98);
        }

        .card-image-container {
            width: 100%;
            height: 55%;
            padding: 0.75rem;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #27272a, #18181b);
            border-radius: 1rem;
            margin: 0.25rem;
            width: calc(100% - 0.5rem);
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
        }

        .card-content-wrapper {
            padding: 0.75rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .info-card-name-en {
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.2;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .info-card-name-th {
            font-size: 0.75rem;
            color: #a1a1aa;
        }

        .card-bottom-row {
            padding: 0 0.75rem 0.75rem 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-card-price-badge {
            font-size: 1.1rem;
            font-weight: 800;
            color: white;
        }

        .add-to-cart-btn {
            background: white;
            color: black;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .add-to-cart-btn:active {
            transform: scale(0.9);
            background: #e4e4e7;
        }

        .fav-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
        }

        .fav-btn.active i {
            color: var(--brand-red);
        }

        .cart-control-wrapper {
            display: flex;
            align-items: center;
            background: #27272a;
            border-radius: 9999px;
            padding: 0.25rem;
            gap: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .cart-qty-btn {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            background: #3f3f46;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .cart-qty-display {
            font-weight: 700;
            font-size: 0.9rem;
            min-width: 1.2rem;
            text-align: center;
        }

        /* Swiper Overrides */
        .swiper-pagination-bullet { background: white !important; opacity: 0.3; }
        .swiper-pagination-bullet-active { background: var(--brand-red) !important; opacity: 1; }

        .toast {
            position: fixed;
            bottom: 6rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(24, 24, 27, 0.95);
            backdrop-filter: blur(10px);
            padding: 0.75rem 1.25rem;
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            min-width: 280px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-left: 4px solid #22c55e; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.info { border-left: 4px solid #3b82f6; }

        /* Ticker Animation */
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-33.33%); }
        }
        .animate-scroll {
            display: flex;
            width: max-content;
            animation: scroll-left 15s linear infinite;
        }

        .level-dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; background: #3f3f46; }
        .level-dot.active-1 { background: #fee2e2; }
        .level-dot.active-2 { background: #fecaca; }
        .level-dot.active-3 { background: #fca5a5; }
        .level-dot.active-4 { background: #f87171; }
        .level-dot.active-5 { background: #ef4444; }
        .level-dot.active-6 { background: #dc2626; }

        .nic-filter-btn {
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            background: #1f1f23;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .nic-filter-btn.active {
            background: white;
            color: black;
            border-color: white;
        }
    </style>
</head>
<body class="pb-20">
    <!-- Header Section -->
    <header id="top-bar" class="fixed top-0 left-0 right-0 z-50 bg-[#121212]/90 backdrop-blur-md px-4 py-3 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <img src="logo.png" alt="Logo" class="w-8 h-8 object-contain">
            <h1 class="font-bold text-lg tracking-tight">RELX <span class="text-brand-red">INFINITY</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="fav-button" class="relative w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 active:scale-90 transition">
                <i class="ri-heart-3-line text-xl text-zinc-400"></i>
                <span id="fav-dot" class="hidden absolute top-2.5 right-2.5 w-2 h-2 bg-brand-red rounded-full border border-[#121212]"></span>
            </button>
            <button id="cart-button" class="relative w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 active:scale-90 transition">
                <i class="ri-shopping-cart-2-line text-xl"></i>
                <span id="cart-item-count" class="hidden absolute -top-1 -right-1 w-5 h-5 bg-brand-red text-white text-[0.65rem] font-black rounded-full flex items-center justify-center border-2 border-[#121212]">0</span>
            </button>
        </div>
    </header>

    <!-- Ticker Bar -->
    <div id="ticker-bar" class="fixed z-40 w-full bg-brand-red py-1.5 overflow-hidden transition-all duration-300">
        <div id="ticker-content" class="animate-scroll whitespace-nowrap text-[0.7rem] font-bold text-white uppercase tracking-widest">
            <!-- Ticker content injected by JS -->
        </div>
    </div>

    <!-- Main Content Header -->
    <div id="main-header" class="fixed z-30 w-full bg-[#121212] pt-4 pb-2 border-b border-white/5">
        <!-- Category Selector -->
        <div id="category-selector" class="flex gap-4 overflow-x-auto px-4 pb-4 no-scrollbar">
            <!-- Categories injected by JS -->
        </div>

        <!-- Filter Area -->
        <div class="px-4 flex justify-between items-end">
            <div id="product-section-title">
                <h2 id="category-name-display" class="text-2xl font-black text-white">Loading...</h2>
                <div id="category-price-display" class="text-sm font-bold text-brand-red mt-0.5">---</div>
            </div>
            <div id="nicotine-filter-container" class="flex gap-2">
                <!-- Nicotine filters injected by JS -->
            </div>
        </div>
    </div>

    <!-- Main Scrollable Area -->
    <main id="app-container" class="hidden pt-[14rem] px-4 space-y-6">
        <!-- Banner Swiper -->
        <div id="banner-container" class="w-full rounded-2xl overflow-hidden aspect-[16/7] mb-6">
            <!-- Banners injected by JS -->
        </div>

        <!-- Special Filters -->
        <div id="special-filter-container" class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
            <button class="special-filter-btn filter-hot px-4 py-2 rounded-xl bg-zinc-800 text-xs font-bold border border-white/5 flex items-center gap-1.5 active:scale-95 transition" data-filter="hot">
                <i class="ri-fire-fill text-orange-500"></i> ฮิตที่สุด
            </button>
            <button class="special-filter-btn filter-new px-4 py-2 rounded-xl bg-zinc-800 text-xs font-bold border border-white/5 flex items-center gap-1.5 active:scale-95 transition" data-filter="new">
                <i class="ri-sparkling-fill text-yellow-400"></i> มาใหม่
            </button>
            <button class="special-filter-btn filter-cool px-4 py-2 rounded-xl bg-zinc-800 text-xs font-bold border border-white/5 flex items-center gap-1.5 active:scale-95 transition" data-filter="cool">
                <i class="ri-snowy-line text-blue-400"></i> เย็นจัด
            </button>
            <button class="special-filter-btn filter-instock hidden px-4 py-2 rounded-xl bg-zinc-800 text-xs font-bold border border-white/5 flex items-center gap-1.5 active:scale-95 transition" data-filter="instock">
                <i class="ri-checkbox-circle-fill text-green-400"></i> พร้อมส่ง
            </button>
            <button class="special-filter-btn filter-outstock hidden px-4 py-2 rounded-xl bg-zinc-800 text-xs font-bold border border-white/5 flex items-center gap-1.5 active:scale-95 transition" data-filter="outstock">
                <i class="ri-close-circle-fill text-red-400"></i> สินค้าหมด
            </button>
        </div>

        <!-- Product Grid -->
        <div id="product-grid" class="grid grid-cols-2 gap-4 pb-12">
            <!-- Product cards injected by JS -->
        </div>

        <!-- Live Status Footer -->
        <div class="flex justify-center py-6 pb-20">
            <div id="live-user-badge" class="hidden flex items-center gap-2 bg-zinc-900/80 px-4 py-2 rounded-full border border-white/5">
                <div class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </div>
                <span id="live-user-count" class="text-[0.65rem] font-bold text-zinc-400 uppercase tracking-widest">-- ออนไลน์</span>
            </div>
        </div>
    </main>

    <!-- Initial Loader -->
    <div id="loader" class="fixed inset-0 z-[100] bg-[#121212] flex flex-col items-center justify-center p-8">
        <div class="relative w-20 h-20 mb-6">
            <div class="absolute inset-0 border-4 border-zinc-800 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-t-brand-red rounded-full animate-spin"></div>
            <img src="logo.png" class="absolute inset-4 object-contain opacity-50">
        </div>
        <p class="text-zinc-400 text-sm animate-pulse font-medium tracking-widest uppercase">กำลังเตรียมสินค้า...</p>
    </div>

    <!-- Notification Container -->
    <div id="toast-container"></div>

    <!-- Core Scripts -->
    <script>
        // --- CORE GLOBAL STATE ---
        window.cart = JSON.parse(localStorage.getItem('shoppingCart') || '[]');
        window.appliedCoupon = null;
        window.allProducts = [];
        window.allCategories = [];
        window.shippingConfig = { fee: 60, freeMin: 500 };
        window.favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        window.currentUser = null;

        const tg = window.Telegram.WebApp;
        let availableCoupons = [];
        let selectedGift = null;
        let currentFilter = {
            categoryId: null,
            searchTerm: '',
            nicotine: null,
            specials: new Set(), 
        };

        // --- CONSOLIDATED GLOBAL FUNCTIONS ---
        
        window.showToast = (message, type = 'info') => {
            const container = document.getElementById('toast-container');
            if (!container) return;
            let icon = '';
            switch(type) {
                case 'success': icon = '<i class="ri-checkbox-circle-fill"></i>'; break;
                case 'error': icon = '<i class="ri-close-circle-fill"></i>'; break;
                default: icon = '<i class="ri-information-fill"></i>';
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="toast-icon">${icon}</span><span>${message}</span>`;
            container.appendChild(toast);
            try { tg.hapticFeedback.notificationOccurred(type === 'error' ? 'error' : 'success'); } catch(e){}
            requestAnimationFrame(() => { setTimeout(() => toast.classList.add('show'), 10); });
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 2000);
        };

        window.updateQuantity = (productId, change) => {
            const item = window.cart.find(i => i.id === productId);
            if (!item) return;
            item.quantity += change;
            if (item.quantity <= 0) {
                window.cart = window.cart.filter(i => i.id !== productId);
            }
            window.updateCartUI(productId);
            try { tg.hapticFeedback.selectionChanged(); } catch(e) {}
        };

        window.addToCart = (productId) => {
            const product = window.allProducts.find(p => p.id === productId);
            if (!product) return;
            if (product.status === 'OUT_OF_STOCK') {
                window.showToast('สินค้าหมด', 'error');
                return;
            }
            const cartItem = window.cart.find(item => item.id === productId);
            if (cartItem) {
                cartItem.quantity++;
            } else {
                const category = window.allCategories.find(c => c.id === product.categoryId);
                window.cart.push({ 
                    id: product.id, nameEn: product.nameEn, nameTh: product.nameTh, 
                    nicotine: product.nicotine, imageUrl: product.imageUrl, 
                    price: category ? parseFloat(category.price) : 0, 
                    categoryName: category ? category.name : '', 
                    categoryId: product.categoryId, quantity: 1 
                });
            }
            window.updateCartUI(productId);
            window.showToast('เพิ่มเข้าตะกร้าแล้ว', 'success');
        };

        window.updateCartUI = async (productId = null) => {
            localStorage.setItem('shoppingCart', JSON.stringify(window.cart));
            window.updateCartIcon();
            await window.autoApplyBestCoupon();
            window.updateCartModalDisplay();
            if (productId) {
                updateProductCardCartControl(productId);
            } else {
                renderProducts();
            }
        };

        window.updateCartIcon = () => {
            const totalItems = window.cart.reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.getElementById('cart-item-count');
            if (badge) {
                badge.textContent = totalItems;
                badge.classList.toggle('hidden', totalItems === 0);
            }
            const favBadge = document.getElementById('fav-cart-badge');
            if (favBadge) {
                favBadge.textContent = totalItems;
                favBadge.classList.toggle('hidden', totalItems === 0);
            }
        };

        window.updateCartModalDisplay = () => {
            const wrapper = document.getElementById('cart-list-wrapper');
            const totalEl = document.getElementById('cart-total-price');
            const subtotalEl = document.getElementById('summary-subtotal');
            const shippingEl = document.getElementById('summary-shipping');
            const discountEl = document.getElementById('summary-discount');
            const discountRow = document.getElementById('summary-discount-row');
            const couponArea = document.getElementById('cart-coupon-area');
            const couponNameEl = document.getElementById('cart-coupon-name');
            const copyBtn = document.getElementById('copy-cart-btn');
            const clearBtn = document.getElementById('clear-cart-btn');
            
            if (!wrapper) return;

            if (window.cart.length === 0) {
                wrapper.innerHTML = '<p class="text-zinc-400 text-center py-4">ตะกร้าของคุณว่างเปล่า</p>';
                if (subtotalEl) subtotalEl.textContent = '฿0';
                if (shippingEl) shippingEl.textContent = '฿0';
                if (totalEl) totalEl.textContent = '฿0';
                if (couponArea) couponArea.classList.add('hidden');
                if (discountRow) discountRow.classList.add('hidden');
                if (copyBtn) copyBtn.disabled = true;
                if (clearBtn) clearBtn.classList.add('hidden');
                return;
            }

            if (copyBtn) copyBtn.disabled = false;
            if (clearBtn) clearBtn.classList.remove('hidden');

            const groups = window.cart.reduce((acc, item) => {
                const key = item.categoryName || 'Other';
                if (!acc[key]) acc[key] = [];
                acc[key].push(item);
                return acc;
            }, {});

            wrapper.innerHTML = Object.entries(groups).map(([cat, items]) => `
                <div class="mb-4">
                    <div class="text-[0.8rem] font-bold text-zinc-500 uppercase tracking-wider mb-2 pl-1">${cat}</div>
                    <div class="space-y-2">
                        ${items.map(item => `
                            <div class="cart-item-row flex items-center gap-3 text-white p-2.5 bg-zinc-800/50 rounded-xl border border-zinc-700/30">
                                <div class="flex-grow min-w-0">
                                    <p class="font-bold text-[1rem] leading-tight truncate">${item.nameEn}</p>
                                    <p class="text-[0.7rem] text-zinc-400 truncate mt-0.5">${item.nameTh || ''}</p>
                                </div>
                                <div class="text-brand-red font-bold text-[0.9rem]">${(item.price * item.quantity).toLocaleString()} ฿</div>
                                <div class="flex items-center bg-zinc-900/50 rounded-full p-1 gap-1 border border-zinc-700/50">
                                    <button class="w-7 h-7 flex items-center justify-center bg-zinc-700 rounded-full" onclick="window.updateQuantity(${item.id}, -1)">
                                        <i class="${item.quantity === 1 ? 'ri-delete-bin-line' : 'ri-subtract-line'}"></i>
                                    </button>
                                    <div class="text-sm font-bold min-w-[20px] text-center">${item.quantity}</div>
                                    <button class="w-7 h-7 flex items-center justify-center bg-zinc-700 rounded-full" onclick="window.updateQuantity(${item.id}, 1)">
                                        <i class="ri-add-line"></i>
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`).join('');

            const subtotal = window.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const isFree = subtotal >= (window.shippingConfig.freeMin);
            const shipFee = isFree ? 0 : window.shippingConfig.fee;
            
            let discount = 0;
            if (window.appliedCoupon) {
                const c = window.appliedCoupon.coupon;
                if (c.type === "DISCOUNT_PERCENT") discount = subtotal * (parseFloat(c.value) / 100);
                else if (c.type === "DISCOUNT_FLAT") discount = parseFloat(c.value);
                
                if (couponArea) {
                    couponArea.classList.remove('hidden');
                    couponNameEl.textContent = c.name;
                    document.getElementById('cart-coupon-desc').textContent = window.appliedCoupon.isAuto ? 'คูปองที่คุ้มที่สุดถูกเลือกให้คุณแล้ว' : 'คุณเลือกใช้คูปองนี้';
                }
                if (discountRow) discountRow.classList.toggle('hidden', c.type === "GIFT" && discount === 0);
                if (discountEl) discountEl.textContent = (c.type === "GIFT") ? "FREE GIFT" : '-฿' + discount.toLocaleString();
            } else {
                if (couponArea) couponArea.classList.add('hidden');
                if (discountRow) discountRow.classList.add('hidden');
            }

            if (subtotalEl) subtotalEl.textContent = '฿' + subtotal.toLocaleString();
            if (shippingEl) shippingEl.textContent = isFree ? 'ฟรี' : '฿' + shipFee;
            if (totalEl) totalEl.textContent = '฿' + Math.max(0, subtotal + shipFee - discount).toLocaleString();
        };

        window.applyManualCoupon = async (couponId) => {
            try {
                if (window.appliedCoupon && window.appliedCoupon.coupon.id === couponId && !window.appliedCoupon.isAuto) {
                    window.appliedCoupon = null;
                    window.showToast('ยกเลิกการใช้คูปองแล้ว', 'info');
                    await window.updateCartUI();
                    renderCouponList();
                    return;
                }

                const telegramId = tg.initDataUnsafe?.user?.id?.toString();
                const cartItems = window.cart.map(i => ({ productId: i.id, categoryId: i.categoryId, qty: i.quantity, price: i.price }));
                const totalAmount = window.cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);

                const res = await fetch('/api/coupons/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegramId, couponId, cartItems, totalAmount })
                });
                const data = await res.json();
                if (!res.ok || !data.success) {
                    tg.showAlert(data.error || 'คูปองนี้ไม่สามารถใช้งานได้');
                    return;
                }

                window.appliedCoupon = data.coupon;
                window.appliedCoupon.isAuto = false;
                window.showToast('ใช้คูปองสำเร็จ', 'success');
                await window.updateCartUI();
                renderCouponList();
                closeCouponSelection();
            } catch (err) {
                console.error(err);
                window.showToast('เกิดข้อผิดพลาด', 'error');
            }
        };

        window.autoApplyBestCoupon = async () => {
            if (window.cart.length === 0) { window.appliedCoupon = null; return; }
            if (window.appliedCoupon && !window.appliedCoupon.isAuto) {
                const telegramId = tg.initDataUnsafe?.user?.id?.toString();
                const cartItems = window.cart.map(i => ({ productId: i.id, categoryId: i.categoryId, qty: i.quantity, price: i.price }));
                const totalAmount = window.cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
                try {
                    const res = await fetch('/api/coupons/validate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ telegramId, couponId: window.appliedCoupon.coupon.id, cartItems, totalAmount })
                    });
                    const data = await res.json();
                    if (data.success) return;
                    window.appliedCoupon = null;
                    window.showToast('เงื่อนไขคูปองไม่ครบถ้วน จึงยกเลิกการใช้คูปอง', 'info');
                } catch (e) { window.appliedCoupon = null; }
            }

            try {
                const telegramId = tg.initDataUnsafe?.user?.id?.toString();
                const totalAmount = window.cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
                const res = await fetch('/api/coupons/best', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegramId, cartItems: window.cart, totalAmount })
                });
                const data = await res.json();
                if (data.success && data.bestCoupon) {
                    window.appliedCoupon = data.bestCoupon;
                    window.appliedCoupon.isAuto = true;
                } else {
                    window.appliedCoupon = null;
                }
            } catch (e) { window.appliedCoupon = null; }
        };

        const renderCouponList = async () => {
            const list = document.getElementById('available-coupons-list');
            if (!list) return;
            try {
                const telegramId = tg.initDataUnsafe?.user?.id?.toString();
                const res = await fetch(`/api/coupons/my/${telegramId}`);
                const data = await res.json();
                if (data.success) {
                    availableCoupons = data.coupons;
                    list.innerHTML = data.coupons.map(c => {
                        const isApplied = window.appliedCoupon && window.appliedCoupon.coupon.id === c.coupon.id;
                        return `
                            <div class="p-4 bg-zinc-900/80 rounded-2xl border ${isApplied ? 'border-brand-red' : 'border-white/5'} active:scale-95 transition" onclick="window.applyManualCoupon('${c.coupon.id}')">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <div class="text-xs font-bold text-yellow-500 uppercase">${c.coupon.id}</div>
                                        <div class="font-bold text-white">${c.coupon.name}</div>
                                        <div class="text-[10px] text-zinc-400 mt-1">${c.coupon.description || ''}</div>
                                    </div>
                                    ${isApplied ? '<i class="ri-checkbox-circle-fill text-brand-red text-xl"></i>' : '<i class="ri-checkbox-blank-circle-line text-zinc-700 text-xl"></i>'}
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (e) {}
        };

        const openCouponSelection = () => {
            renderCouponList();
            const modal = document.getElementById('coupon-select-modal');
            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('coupon-select-content').classList.remove('translate-y-full'), 10);
        };
        const closeCouponSelection = () => {
            document.getElementById('coupon-select-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('coupon-select-modal').classList.add('hidden'), 300);
        };
        window.openCouponSelection = openCouponSelection;
        window.closeCouponSelection = closeCouponSelection;

        // --- UI RENDER HELPERS ---
        const renderDots = (level) => {
            let dotsHtml = '<div class="flex gap-1">';
            for (let i = 1; i <= 6; i++) {
                dotsHtml += `<div class="w-2 h-2 rounded-full ${i <= level ? 'bg-brand-red' : 'bg-zinc-700'}"></div>`;
            }
            dotsHtml += '</div>';
            return dotsHtml;
        };

        const updateProductCardCartControl = (productId) => {
            const p = window.allProducts.find(x => x.id === productId);
            if (!p) return;
            const containers = document.querySelectorAll(`.cart-control-container[data-product-id="${productId}"]`);
            const cartItem = window.cart.find(i => i.id === productId);
            containers.forEach(container => {
                if (p.status === 'OUT_OF_STOCK') {
                    container.innerHTML = '<span class="text-[0.7rem] font-bold text-zinc-500 uppercase">หมด</span>';
                } else if (cartItem && cartItem.quantity > 0) {
                    container.innerHTML = `
                        <div class="flex items-center bg-zinc-800 rounded-full p-1 gap-3 border border-white/5">
                            <button class="w-7 h-7 flex items-center justify-center bg-zinc-700 rounded-full" onclick="window.updateQuantity(${p.id}, -1)">
                                <i class="${cartItem.quantity === 1 ? 'ri-delete-bin-line' : 'ri-subtract-line'}"></i>
                            </button>
                            <span class="font-bold text-sm min-w-[15px] text-center">${cartItem.quantity}</span>
                            <button class="w-7 h-7 flex items-center justify-center bg-zinc-700 rounded-full" onclick="window.updateQuantity(${p.id}, 1)">
                                <i class="ri-add-line"></i>
                            </button>
                        </div>`;
                } else {
                    container.innerHTML = `
                        <button class="bg-white text-black px-4 py-1.5 rounded-full font-bold text-xs active:scale-90 transition" onclick="window.addToCart(${p.id})">
                            <i class="ri-shopping-cart-2-line mr-1"></i> เพิ่ม
                        </button>`;
                }
            });
        };

        const renderProducts = () => {
            const grid = document.getElementById('product-grid');
            if (!grid) return;
            const filtered = window.allProducts.filter(p => 
                (currentFilter.categoryId === null || p.categoryId === currentFilter.categoryId) &&
                ((p.nameEn || '').toLowerCase().includes(currentFilter.searchTerm.toLowerCase())) &&
                (currentFilter.nicotine === null || p.nicotine === currentFilter.nicotine)
            );
            grid.innerHTML = filtered.map(p => {
                const cat = window.allCategories.find(c => c.id === p.categoryId);
                const price = cat ? parseFloat(cat.price).toLocaleString() : '---';
                const cartItem = window.cart.find(i => i.id === p.id);
                return `
                <div class="bg-zinc-900/50 rounded-3xl p-3 border border-white/5 flex flex-col gap-2">
                    <div class="aspect-square bg-zinc-800 rounded-2xl p-4 relative flex items-center justify-center overflow-hidden">
                        <img src="${p.imageUrl || 'logo.png'}" class="w-full h-full object-contain filter drop-shadow-xl">
                        <button class="absolute top-2 right-2 w-8 h-8 rounded-full bg-black/20 backdrop-blur-md flex items-center justify-center" onclick="window.toggleFavorite(${p.id})">
                            <i class="${window.favorites.includes(p.id) ? 'ri-heart-3-fill text-brand-red' : 'ri-heart-3-line text-white'}"></i>
                        </button>
                    </div>
                    <div class="px-1">
                        <div class="text-[0.7rem] text-zinc-500 font-bold uppercase tracking-widest">${cat?.name || ''}</div>
                        <div class="font-bold text-white text-sm line-clamp-1">${p.nameEn}</div>
                        <div class="text-[0.65rem] text-zinc-400 mt-0.5">${p.nicotine !== null ? `NIC ${p.nicotine}%` : ''}</div>
                    </div>
                    <div class="mt-auto pt-2 flex justify-between items-center px-1">
                        <div class="font-black text-lg">฿${price}</div>
                        <div class="cart-control-container" data-product-id="${p.id}">
                            ${p.status === 'OUT_OF_STOCK' ? '<span class="text-[0.7rem] font-bold text-zinc-500 uppercase">หมด</span>' : 
                                (cartItem ? `
                                <div class="flex items-center bg-zinc-800 rounded-full p-1 gap-3">
                                    <button class="w-7 h-7 flex items-center justify-center bg-zinc-700 rounded-full" onclick="window.updateQuantity(${p.id}, -1)">
                                        <i class="${cartItem.quantity === 1 ? 'ri-delete-bin-line' : 'ri-subtract-line'}"></i>
                                    </button>
                                    <span class="font-bold text-sm">${cartItem.quantity}</span>
                                    <button class="w-7 h-7 flex items-center justify-center bg-zinc-700 rounded-full" onclick="window.updateQuantity(${p.id}, 1)">
                                        <i class="ri-add-line"></i>
                                    </button>
                                </div>` : `<button class="bg-white text-black px-4 py-1.5 rounded-full font-bold text-xs" onclick="window.addToCart(${p.id})">เพิ่ม</button>`)
                            }
                        </div>
                    </div>
                </div>`;
            }).join('');
        };

        window.toggleFavorite = (productId) => {
            const idx = window.favorites.indexOf(productId);
            if (idx === -1) {
                window.favorites.push(productId);
                window.showToast('เพิ่มในรายการที่ชอบ', 'success');
            } else {
                window.favorites.splice(idx, 1);
                window.showToast('ลบออกจากรายการที่ชอบ', 'info');
            }
            localStorage.setItem('favorites', JSON.stringify(window.favorites));
            window.updateCartIcon();
            renderProducts();
        };

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const [resP, resC, resS] = await Promise.all([
                    fetch('/api/products'),
                    fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ initData: tg.initData }) }),
                    fetch('/api/config/shipping')
                ]);
                
                const dataP = await resP.json();
                window.allProducts = dataP.products;
                window.allCategories = dataP.categories;

                if (resC.ok) {
                    const dataC = await resC.json();
                    window.currentUser = dataC.customer;
                }

                if (resS.ok) {
                    const dataS = await resS.json();
                    window.shippingConfig = { fee: dataS.shippingFee, freeMin: dataS.freeShippingMin };
                }

                // Initial Ticker
                const ticker = document.getElementById('ticker-content');
                if (ticker) ticker.innerHTML = 'ยินดีต้อนรับสู่ RELX INFINITY • สินค้าพร้อมส่งทุกรายการ • จัดส่งรวดเร็วทันใจ';

                // Initial Render
                if (dataP.categories.length > 0) {
                    currentFilter.categoryId = dataP.categories[0].id;
                    const catBox = document.getElementById('category-selector');
                    catBox.innerHTML = dataP.categories.map(c => `
                        <div class="category-wrapper ${currentFilter.categoryId === c.id ? 'active' : ''}" onclick="selectCategory(this, ${c.id})">
                            <div class="category-item"><img src="${c.imageUrl || 'logo.png'}"></div>
                            <span class="category-label">${c.name}</span>
                        </div>
                    `).join('');
                    document.getElementById('category-name-display').textContent = dataP.categories[0].name;
                    document.getElementById('category-price-display').textContent = parseFloat(dataP.categories[0].price).toLocaleString() + '฿';
                }

                await window.updateCartUI();
                document.getElementById('loader').remove();
                document.getElementById('app-container').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = '<p class="text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
            }
        });

        function selectCategory(el, id) {
            document.querySelectorAll('.category-wrapper').forEach(w => w.classList.remove('active'));
            el.classList.add('active');
            currentFilter.categoryId = id;
            const cat = window.allCategories.find(c => c.id === id);
            document.getElementById('category-name-display').textContent = cat?.name || '';
            document.getElementById('category-price-display').textContent = parseFloat(cat?.price || 0).toLocaleString() + '฿';
            renderProducts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.openCartModal = () => {
            window.updateCartModalDisplay();
            const m = document.getElementById('cart-modal');
            m.classList.remove('hidden');
            setTimeout(() => document.getElementById('cart-modal-content').classList.remove('translate-y-full'), 10);
        };
        window.closeCartModal = () => {
            document.getElementById('cart-modal-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('cart-modal').classList.add('hidden'), 300);
        };

        window.copyCartToClipboard = () => {
            if (window.cart.length === 0) return;
            let text = "รายการสั่งซื้อสินค้า\n\n";
            const groups = window.cart.reduce((acc, item) => {
                if (!acc[item.categoryName]) acc[item.categoryName] = [];
                acc[item.categoryName].push(item);
                return acc;
            }, {});
            Object.keys(groups).forEach(cat => {
                text += `[${cat}]\n`;
                groups[cat].forEach(i => text += `- ${i.nameEn} x ${i.quantity}\n`);
                text += "\n";
            });
            if (window.appliedCoupon) text += `🎫 คูปอง: ${window.appliedCoupon.coupon.name}\n\n`;
            const subtotal = window.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const isFree = subtotal >= window.shippingConfig.freeMin;
            const ship = isFree ? 0 : window.shippingConfig.fee;
            let disc = 0;
            if (window.appliedCoupon) {
                const c = window.appliedCoupon.coupon;
                if (c.type === "DISCOUNT_PERCENT") disc = subtotal * (parseFloat(c.value) / 100);
                else if (c.type === "DISCOUNT_FLAT") disc = parseFloat(c.value);
            }
            text += `ยอดรวมสุทธิ: ฿${(subtotal + ship - disc).toLocaleString()}`;
            navigator.clipboard.writeText(text).then(() => {
                window.showToast('คัดลอกรายการสั่งซื้อแล้ว', 'success');
                window.closeCartModal();
            });
        };
        
        window.clearCart = () => {
            if (confirm('ล้างตะกร้าสินค้าทั้งหมด?')) {
                window.cart = [];
                window.updateCartUI();
                window.showToast('ล้างตะกร้าแล้ว', 'info');
            }
        };

        // Socket.io for live updates
        const socket = io();
        socket.on('product_update', (data) => {
            const p = window.allProducts.find(x => x.id === data.productId);
            if (p) {
                p.status = data.status;
                window.updateProductCardCartControl(data.productId);
            }
        });
    </script>

    <!-- Cart Modal -->
    <div id="cart-modal" class="hidden fixed inset-0 z-[70] flex items-end justify-center bg-black/60 backdrop-blur-sm">
        <div id="cart-modal-content" class="bg-zinc-800 w-full max-w-md rounded-t-[2.5rem] flex flex-col max-h-[85vh] transform translate-y-full transition-transform duration-300">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="ri-shopping-cart-2-line text-2xl text-brand-red"></i>
                    <h3 class="text-xl font-bold">ตะกร้าของคุณ</h3>
                </div>
                <button onclick="window.closeCartModal()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center"><i class="ri-close-line text-xl"></i></button>
            </div>
            <div id="cart-items-container" class="flex-grow overflow-y-auto p-6 pt-2">
                <div id="cart-list-wrapper" class="space-y-4"></div>
            </div>
            <div class="p-6 bg-zinc-900/50 border-t border-white/5 space-y-4">
                <div id="cart-coupon-area" class="hidden p-4 bg-yellow-500/10 border border-yellow-500/20 rounded-2xl flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <i class="ri-ticket-2-fill text-yellow-500 text-xl"></i>
                        <div>
                            <div id="cart-coupon-name" class="font-bold text-yellow-500 text-sm">COUPON_NAME</div>
                            <div id="cart-coupon-desc" class="text-[10px] text-zinc-400 mt-0.5">---</div>
                        </div>
                    </div>
                    <button onclick="window.openCouponSelection()" class="text-[10px] bg-yellow-500 text-black px-3 py-1.5 rounded-full font-black uppercase active:scale-95 transition">เปลี่ยน</button>
                </div>
                <div class="space-y-2 text-sm text-zinc-400">
                    <div class="flex justify-between"><span>ยอดรวมสินค้า</span><span id="summary-subtotal" class="text-white font-bold">฿0</span></div>
                    <div class="flex justify-between"><span>ค่าจัดส่ง</span><span id="summary-shipping" class="text-white font-bold">฿0</span></div>
                    <div id="summary-discount-row" class="hidden flex justify-between text-yellow-500"><span>ส่วนลด</span><span id="summary-discount" class="font-bold">-฿0</span></div>
                </div>
                <div class="flex justify-between items-center pt-4 border-t border-white/5">
                    <div>
                        <div class="text-[0.65rem] text-zinc-500 font-bold uppercase tracking-widest">ยอดสุทธิ</div>
                        <div id="cart-total-price" class="text-3xl font-black text-white">฿0</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.clearCart()" id="clear-cart-btn" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-red-500 active:scale-95 transition"><i class="ri-delete-bin-line text-xl"></i></button>
                        <button onclick="window.copyCartToClipboard()" id="copy-cart-btn" class="px-8 py-3.5 bg-green-600 hover:bg-green-500 rounded-2xl font-black text-white active:scale-95 transition shadow-lg shadow-green-900/20">คัดลอกรายการ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Coupon Modal -->
    <div id="coupon-select-modal" class="hidden fixed inset-0 z-[80] flex items-end justify-center bg-black/60 backdrop-blur-sm">
        <div id="coupon-select-content" class="bg-zinc-800 w-full max-w-md rounded-t-[2.5rem] flex flex-col max-h-[70vh] transform translate-y-full transition-transform duration-300">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-xl font-bold">เลือกคูปองที่ต้องการ</h3>
                <button onclick="window.closeCouponSelection()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center"><i class="ri-close-line text-xl"></i></button>
            </div>
            <div id="available-coupons-list" class="p-6 overflow-y-auto space-y-4"></div>
        </div>
    </div>

</body>
</html>
