    <style>
        :root {
            --bg-color: #121212;
            --secondary-bg: #1E1E1E;
            --text-primary: #FFFFFF;
            --brand-gradient: linear-gradient(to right, #f6971f, #e32622);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Kanit', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        .glass-card {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        
        /* Toast Notification */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            pointer-events: none;
        }
        .toast {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 14px 16px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .toast.show { opacity: 1; transform: translateY(0) scale(1); }
        .toast.success .toast-icon { color: #4ade80; }
        .toast.error .toast-icon { color: #f87171; }
        .toast.info .toast-icon { color: #60a5fa; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-5 select-none overflow-x-hidden relative pb-32">

        <div class="w-16 h-16 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-gray-400 animate-pulse">กำลังโหลดข้อมูลชำระเงิน...</p>
    </div>

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-zinc-800/50 flex items-center justify-center border border-zinc-700/50 active:scale-95 transition">
            <i class="ri-arrow-left-s-line text-xl text-white"></i>
        </button>
        <h1 class="text-xl font-bold">ชำระเงิน</h1>
        <div class="w-10 h-10"></div> <!-- Spacer -->
    </div>

    <div id="payment-content" class="hidden space-y-5">
        <!-- Order Summary -->
        <div class="glass-card p-5">
            <div class="flex justify-between items-start mb-3">
                <div>
                    <p class="text-sm text-gray-400">รหัสออเดอร์</p>
                    <p id="display-order-id" class="font-bold tracking-wider">ORD-XXXXXX</p>

            <div class="border-t border-white/10 my-4"></div>
            
            <div class="flex justify-between items-center">
                <p class="text-gray-400">ยอดที่ต้องชำระ</p>
                <p id="display-total" class="text-2xl font-bold text-brand-red">0 ฿</p>

        <!-- Bank Details -->
        <div id="bank-details-container" class="glass-card p-5 overflow-hidden relative">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/10 rounded-full blur-2xl pointer-events-none"></div>
            
            <h2 class="font-bold text-lg mb-4 flex items-center gap-2">
                <i class="ri-bank-card-line text-blue-400"></i> โอนเงินเข้าบัญชี

            <div class="flex items-center gap-4 mb-4 bg-zinc-900/50 p-4 rounded-xl border border-zinc-700/50">
                <div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center overflow-hidden shrink-0">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Kasikornbank_logo.svg/1200px-Kasikornbank_logo.svg.png" alt="Bank" class="w-8 h-8 object-contain">

                    <!-- The actual canvas where QRCode will render -->

        </div>

        <!-- Upload Slip Area (Phase 3 Prep) -->
        <div id="upload-section" class="mt-6">
            <!-- Keep file input OUTSIDE uploadArea so JS innerHTML replacement doesn't destroy it -->
            <input type="file" id="slip-input" accept="image/*" class="hidden">
            <div class="border-2 border-dashed border-zinc-600 rounded-2xl p-8 text-center bg-zinc-800/30 transition-all hover:bg-zinc-800/50 cursor-pointer" id="upload-area">
                <label for="slip-input" class="cursor-pointer flex flex-col items-center">
                    <div class="w-16 h-16 bg-blue-500/20 text-blue-400 rounded-full flex items-center justify-center mb-4">
                        <i class="ri-upload-cloud-2-line text-3xl"></i>
                    </div>
                    <p class="font-bold text-lg">อัปโหลดสลิปโอนเงิน</p>

                </label>
            </div>

            <button id="submit-slip-btn" disabled class="w-full mt-4 py-4 bg-gradient-to-r from-blue-600 to-blue-500 rounded-xl font-bold text-lg text-white shadow-lg opacity-50 cursor-not-allowed flex items-center justify-center gap-2 transition-all">
                <i class="ri-check-double-line"></i> ยืนยันการชำระเงิน
            </button>
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = 'ri-checkbox-circle-fill';
            if (type === 'error') icon = 'ri-error-warning-fill';
            else if (type === 'warning') icon = 'ri-alert-fill';
            else if (type === 'info') icon = 'ri-information-fill';

            toast.innerHTML = `<i class="${icon} toast-icon"></i><span>${message}</span>`;
            container.appendChild(toast);
            
            // Trigger reflow for animation
            void toast.offsetWidth;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
            
            if (tg.HapticFeedback) {
                if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
                else if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
                else tg.HapticFeedback.notificationOccurred('warning');
            }
        }

        function copyBankAccount(accNumber) {
            navigator.clipboard.writeText(accNumber).then(() => {
                showToast('คัดลอกเลขบัญชีแล้ว', 'success');
            }).catch(() => {
                showToast('ไม่สามารถคัดลอกได้', 'error');
            });
        }

        function generatePromptPayPayload(target, amount) {
            function crc16(data) {
                let crc = 0xFFFF;
                for (let i = 0; i < data.length; i++) {
                    crc ^= data.charCodeAt(i) << 8;
                    for (let j = 0; j < 8; j++) {
                        if ((crc & 0x8000) > 0) crc = (crc << 1) ^ 0x1021;
                        else crc <<= 1;
                    }
                }
                return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
            }

            let targetType = target.length >= 13 ? '02' : '01';
            let targetStr = target;
            if (targetType === '01') {
                targetStr = targetStr.replace(/^0/, '66');
                targetStr = targetStr.padStart(13, '0');
            }
            
            let amountStr = '';
            if (amount) {
                let amt = amount.toFixed(2);
                amountStr = `54${String(amt.length).padStart(2, '0')}${amt}`;
            }

            let payload29 = `0016A000000677010111${targetType}${String(targetStr.length).padStart(2, '0')}${targetStr}`;
            let payload = `00020101021129${String(payload29.length).padStart(2, '0')}${payload29}5802TH5303764${amountStr}6304`;
            
            return payload + crc16(payload);
        }

        async function initPayment() {
            if (tg.isVersionAtLeast('7.7')) {
                tg.disableVerticalSwipes();
            }
            tg.expand();

            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('orderId');

            if (!orderId) {
                document.getElementById('loading-screen').classList.add('hidden');
                showToast('ไม่พบรหัสออเดอร์', 'error');
                return;
            }

            try {
                // Fetch Order Details
                const res = await fetch(`/api/orders/${orderId}`);
                const data = await res.json();

                if (data.success && data.order) {
                    const order = data.order;
                    const bankAccount = data.bankAccount;

                    if (window.posthog) {
                        const tgUid = tg.initDataUnsafe?.user?.id?.toString();
                        if (tgUid) posthog.identify(tgUid, { customerId: order.customerId });
                        posthog.capture('View Payment Page', { orderId: order.id, totalAmount: parseFloat(order.totalAmount) });
                    }

                    document.getElementById('display-order-id').textContent = order.id;
                    document.getElementById('display-total').textContent = `${parseFloat(order.totalAmount).toLocaleString('th-TH')} ฿`;

                    // Populate Order Items
                    const itemsContainer = document.getElementById('order-items-list');
                    let itemsHtml = '';
                    let subtotal = 0;
                    let hasOutOfStockItems = false;
                    if (order.items && order.items.length > 0) {
                        order.items.forEach(item => {
                            const name = item.product ? item.product.nameEn : 'สินค้า';
                            const categoryName = item.product?.category?.name ? `<span class="text-[10px] text-zinc-500 bg-zinc-800 px-1.5 py-0.5 rounded mr-1 whitespace-nowrap">${item.product.category.name}</span>` : '';
                            const nicotineStr = item.product?.nicotine !== null ? `(${item.product.nicotine}%)` : '';
                            
                            let stockWarningHtml = '';
                            if (item.product && item.product.stockQuantity < item.quantity) {
                                hasOutOfStockItems = true;
                                stockWarningHtml = `<div class="text-[10px] text-red-500 mt-0.5"><i class="ri-error-warning-line"></i> สินค้ามีไม่เพียงพอ (เหลือ ${item.product.stockQuantity} ชิ้น)</div>`;
                            }

                            const price = parseFloat(item.priceAtPurchase);
                            const itemTotal = price * item.quantity;
                            subtotal += itemTotal;
                            itemsHtml += `
                                <div class="py-1.5 border-b border-zinc-700/30 last:border-0">
                                    <div class="flex justify-between items-start text-sm">
                                        <div class="flex items-center pr-2 overflow-hidden flex-wrap gap-y-1">
                                            ${categoryName}
                                            <span class="truncate text-zinc-300 text-xs">${name} ${nicotineStr} x${item.quantity}</span>
                                        </div>
                                        <span class="whitespace-nowrap text-zinc-300 flex-shrink-0">${itemTotal.toLocaleString('th-TH')} ฿</span>
                                    </div>
                                    ${stockWarningHtml}
                                </div>
                            `;
                        });
                        itemsContainer.innerHTML = itemsHtml;
                        
                        if (hasOutOfStockItems) {
                            const uploadSection = document.getElementById('upload-section');
                            if (uploadSection) {
                                const warningDiv = document.createElement('div');
                                warningDiv.className = "bg-red-500/10 border border-red-500/30 rounded-xl p-4 text-center mt-4 mb-4";
                                warningDiv.innerHTML = `
                                    <i class="ri-error-warning-fill text-red-500 text-3xl mb-2"></i>
                                    <div class="text-red-500 font-bold mb-1">ไม่สามารถชำระเงินได้</div>
                                    <div class="text-xs text-red-400 mb-4 leading-relaxed">ขออภัย สินค้าบางรายการในคำสั่งซื้อนี้หมดสต๊อกแล้วระหว่างรอชำระเงิน กรุณายกเลิกคำสั่งซื้อนี้ในหน้าประวัติแล้วทำรายการใหม่</div>
                                    <button onclick="window.location.href='products.html'" class="w-full py-3 bg-zinc-800 text-white rounded-xl text-sm font-bold active:scale-95 transition border border-zinc-700">กลับสู่หน้าหลัก</button>
                                `;
                                
                                const uploadArea = document.getElementById('upload-area');
                                const submitBtn = document.getElementById('submit-slip-btn');
                                const bankDetailsContainer = document.getElementById('bank-details-container');
                                
                                if (uploadArea) uploadArea.style.display = 'none';
                                if (submitBtn) submitBtn.style.display = 'none';
                                if (bankDetailsContainer) bankDetailsContainer.style.display = 'none';
                                
                                uploadSection.prepend(warningDiv);
                                window.isPaymentBlocked = true; // Set a global flag
                            }
                        }
                    }

                    // Populate breakdown
                    document.getElementById('display-subtotal').textContent = `${subtotal.toLocaleString('th-TH')} ฿`;
                    
                    const discount = parseFloat(order.discountAmount || 0);
                    if (discount > 0) {
                        const discountRow = document.getElementById('discount-row');
                        discountRow.classList.remove('hidden');
                        document.getElementById('display-discount').textContent = `- ${discount.toLocaleString('th-TH')} ฿`;
                        if (order.appliedCouponId) {
                            document.getElementById('display-coupon-id').textContent = `(${order.appliedCouponId})`;
                        }
                    }

                    // Calculate Shipping (Total = Subtotal - Discount + Shipping) => Shipping = Total - Subtotal + Discount
                    const total = parseFloat(order.totalAmount);
                    let shipping = total - subtotal + discount;
                    // Fix floating point math issues
                    shipping = Math.max(0, Math.round(shipping));
                    document.getElementById('display-shipping').textContent = shipping === 0 ? 'ฟรี' : `${shipping.toLocaleString('th-TH')} ฿`;

                    if (bankAccount) {
                        // Populate Bank Details
                        document.getElementById('display-bank-name').textContent = bankAccount.bankName;
                        document.getElementById('display-account-name').textContent = bankAccount.accountName;
                        document.getElementById('display-account-number').textContent = bankAccount.accountNumber;
                        document.getElementById('btn-copy-account').onclick = () => copyBankAccount(bankAccount.accountNumber);

                        // Generate PromptPay QR
                        if (bankAccount.promptPayId && window.QRCodeStyling) {
                            const payload = generatePromptPayPayload(bankAccount.promptPayId, parseFloat(order.totalAmount));
                            const qrContainer = document.getElementById('qr-canvas');
                            
                            const qrCode = new QRCodeStyling({
                                width: 200,
                                height: 200,
                                data: payload,
                                dotsOptions: { color: "#000000", type: "rounded" },
                                backgroundOptions: { color: "#ffffff" },
                                imageOptions: { crossOrigin: "anonymous", margin: 5 }
                            });
                            
                            document.getElementById('qr-placeholder').classList.add('hidden');
                            qrContainer.classList.remove('hidden');
                            qrCode.append(qrContainer);
                        }
                    } else {
                        // Hide bank section or show warning if no bank account is available
                        document.getElementById('bank-details-container').innerHTML = '<p class="text-center text-red-400 p-4">ไม่มีช่องทางชำระเงินที่รองรับสำหรับยอดนี้</p>';
                    }

                    document.getElementById('loading-screen').classList.add('hidden');
                    document.getElementById('payment-content').classList.remove('hidden');
                } else {
                    throw new Error(data.error || 'ไม่สามารถโหลดข้อมูลออเดอร์ได้');
                }
            } catch (err) {
                console.error("Payment Init Error:", err);
                document.getElementById('loading-screen').classList.add('hidden');
                showToast(err.message || 'เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
            }

            // Dummy Slip Upload Logic for Phase 2 UI
            const slipInput = document.getElementById('slip-input');
            const submitBtn = document.getElementById('submit-slip-btn');
            const uploadArea = document.getElementById('upload-area');

            if (slipInput && !window.isPaymentBlocked) {
            // Whole uploadArea acts as a click target for the (hidden) file input —
            // works both before and after the preview replaces innerHTML.
            uploadArea.addEventListener('click', (e) => {
                if (e.target.closest('#submit-slip-btn')) return;
                slipInput.click();
            });

            slipInput.addEventListener('change', function(e) {
                if (this.files && this.files[0]) {
                    const file = this.files[0];
                    const previewUrl = URL.createObjectURL(file);
                    uploadArea.innerHTML = `
                        <div class="flex flex-col items-center">
                            <img src="${previewUrl}" alt="slip preview" class="max-h-40 rounded-xl mb-3 object-contain border border-white/10">
                            <p class="text-white font-medium text-sm truncate max-w-full">${file.name}</p>
                            <p class="text-xs text-blue-400 mt-2 underline">แตะเพื่อเปลี่ยนรูปภาพ</p>
                        </div>
                    `;
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    submitBtn.classList.add('shadow-blue-500/50');
                    submitBtn.onclick = async () => {
                        const originalText = submitBtn.innerHTML;
                        submitBtn.innerHTML = '<div class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full mr-2"></div> กำลังตรวจสอบ...';
                        submitBtn.disabled = true;
                        
                        const formData = new FormData();
                        formData.append('files', file);

                        try {
                            const res = await fetch(`/api/orders/${orderId}/verify-slip`, {
                                method: 'POST',
                                body: formData
                            });
                            
                            const data = await res.json();
                            
                            if (data.success) {
                                // Clear cart on successful payment
                                window.localStorage.removeItem('cart');

                                if (window.posthog) {
                                    posthog.capture('Submit Payment Slip', { orderId });
                                }

                                tg.showPopup({
                                    title: 'ชำระเงินสำเร็จ',
                                    message: 'ตรวจสอบสลิปและยืนยันคำสั่งซื้อเรียบร้อยแล้ว แอดมินจะทำการจัดส่งสินค้าโดยเร็วที่สุด',
                                    buttons: [{ id: 'ok', type: 'default', text: 'ตกลง' }]
                                }, () => {
                                    // Optionally redirect to a success page or back to shop menu
                                    window.location.href = 'products.html';
                                });
                            } else {
                                submitBtn.innerHTML = originalText;
                                submitBtn.disabled = false;
                                
                                const errMsg = data.error || 'ตรวจสอบสลิปไม่สำเร็จ';
                                if (errMsg.length > 200) {
                                    showToast('ข้อผิดพลาดจากเซิร์ฟเวอร์', 'error');
                                } else {
                                    tg.showAlert(errMsg);
                                }
                            }
                        } catch (err) {
                            console.error('Verify Slip Error:', err);
                            submitBtn.innerHTML = originalText;
                            submitBtn.disabled = false;
                            showToast('เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่', 'error');
                        }
                    };
                }
            });
        }

                    // Real-time polling
            if (!window.isPaymentBlocked) {
                setInterval(async () => {
                    if (window.isPaymentBlocked) return;
                    try {
                        const pollRes = await fetch(`/api/orders/${orderId}?v=${Date.now()}`, { cache: 'no-cache', headers: { 'x-silent-poll': 'true' } });
                        const pollData = await pollRes.json();
                        if (pollData.success && pollData.order && pollData.order.items) {
                            let outOfStock = false;
                            pollData.order.items.forEach(item => {
                                if (item.product && item.product.stockQuantity < item.quantity) {
                                    outOfStock = true;
                                }
                            });
                            
                            if (outOfStock) {
                                window.isPaymentBlocked = true;
                                const uploadSection = document.getElementById('upload-section');
                                const bankDetailsContainer = document.getElementById('bank-details-container');
                                
                                if (bankDetailsContainer) bankDetailsContainer.style.display = 'none';
                                
                                if (uploadSection) {
                                    const warningDiv = document.createElement('div');
                                    warningDiv.className = "bg-red-500/10 border border-red-500/30 rounded-xl p-4 text-center mt-4 mb-4";
                                    warningDiv.innerHTML = `
                                        <i class="ri-error-warning-fill text-red-500 text-3xl mb-2"></i>
                                        <div class="text-red-500 font-bold mb-1">ไม่สามารถชำระเงินได้</div>
                                        <div class="text-xs text-red-400 mb-4 leading-relaxed">ขออภัย สินค้าบางรายการในคำสั่งซื้อนี้หมดสต๊อกแล้วระหว่างรอชำระเงิน กรุณายกเลิกคำสั่งซื้อนี้ในหน้าประวัติแล้วทำรายการใหม่</div>
                                        <button onclick="window.location.href='products.html'" class="w-full py-3 bg-zinc-800 text-white rounded-xl text-sm font-bold active:scale-95 transition border border-zinc-700">กลับสู่หน้าหลัก</button>
                                    `;
                                    
                                    const uploadArea = document.getElementById('upload-area');
                                    const submitBtn = document.getElementById('submit-slip-btn');
                                    if (uploadArea) uploadArea.style.display = 'none';
                                    if (submitBtn) submitBtn.style.display = 'none';
                                    
                                    uploadSection.prepend(warningDiv);
                                }
                            }
                        }
                    } catch(e) {}
                }, 5000); // 5 sec poll
            }
        }         if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPayment);
        } else {
            initPayment();
        }
    </script>
</body>
</html>
